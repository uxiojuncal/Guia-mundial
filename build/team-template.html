<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/team.css">
</head>
<body>
    <nav>
        <ul class="group-nav">
            <li class="left-nav" data-link="prev-group">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <a data-slot="prev-group-link" href="#"></a>
            </li>
            <li class="center-nav" data-link="group"><a data-slot="current-group-link" href="#"></a></li>
            <li class="right-nav" data-link="next-group">
                <a data-slot="next-group-link" href="#"></a>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </li>
        </ul>
        <ul class="team-nav">
            <li class="left-nav" data-link="prev-team">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <a data-slot="prev-team-link" href="#"></a>
            </li>
            <li class="center-nav" data-link="team"><a data-slot="current-team-link" href="#"></a></li>
            <li class="right-nav" data-link="next-team">
                <a data-slot="next-team-link" href="#"></a>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </li>
        </ul>
    </nav>
    <header class="team-header">
        <div class="title-wrapper">
            <h1 class="team-title" data-slot="name"></h1>
            <h2 class="team-subtitle" data-slot="subtitle"></h2>
        </div>
        <div class="badge-wrapper">
            <img src="" alt="Escudo de México" class="badge-img" data-slot="badge">
        </div>
    </header>
    <div class="team-content">
        <div class="team-coach-ratings-wrapper">
            <div class="team-coach">
                <img src="" alt="imagen del entrenador" class="coach-img" data-slot="coach-image">
                <h2 class="coach-title">EL ENTRENADOR</h2>
                <div class="blue-divisor"></div>
                <h3 class="coach-name" data-slot="coach-name"></h3>
                <h4 class="coach-desc" data-slot="coach-desc"></h4>
            </div>
            <div class="team-ratings">
                <h3 class="ratings-title"><b>NOTAS DEL EQUIPO</b></h3>
                <ul class="ratings-list">
                    <li>Plantilla: <span data-slot="players-rating"></span>/10</li>
                    <li>Entrenador: <span data-slot="coach-rating"></span>/10</li>
                    <li>Expectativas: <span data-slot="expectations"></span></li>
                </ul>
            </div>
        </div>
        <div class="team-description">
            <div class="highlighted-players">
                <h3 class="section-title">JUGADORES A DESTACAR</h3>
                <ul class="players-list" data-slot="hl-players" data-type="list">
                    <!-- Highlighted players will be populated here -->
                </ul>
            </div>
            <div class="promising-players">
                <h3 class="section-title">JÓVENES REVELACIÓN</h3>
                <ul class="players-list" data-slot="prom-players" data-type="list">
                    <!-- Promising players will be populated here -->
                </ul>
            </div>
        </div>
    </div>
    <h2 class="lineup-title">Alineación Probable</h2>
    <div class="lineup-container">
        <div class="line-up" aria-label="Soccer lineup">
            <section class="formation"></section>
        </div>
    </div>
    <script defer src="../scripts/alineacion.js"></script>
</body>
</html>
