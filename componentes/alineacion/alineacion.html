<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup</title>
    <link rel="stylesheet" href="./alineacion.css">
</head>
<body>
    <div class="lineup-container">
        <main class="line-up" aria-label="Soccer lineup">
            <section class="formation">
                <div class="line line--attack" data-row="attack"></div>
                <div class="line line--midfield" data-row="midfield"></div>
                <div class="line line--defense" data-row="defense"></div>
                <div class="line line--gk" data-row="gk"></div>
            </section>
        </main>
    </div>
    <script src="./alineacion.js"></script>
</body>
</html>
