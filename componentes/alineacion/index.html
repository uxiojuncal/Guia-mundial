<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup</title>
    <link rel="stylesheet" href="./alineacion.css">
</head>
<body>
    <div class="lineup-container">
        <div class="lineup-header">
            <p class="lineup-label">Alineación Probable</p>
            <div class="team-badge" aria-label="Vilaboa FC team badge">
                <img src="img/country-flag.png" alt="Vilaboa FC flag" class="country-flag">
                <h6 class="team-name">Vilaboa FC</h6>
            </div>
            <button id="toggle-4231" class="toggle-formation-btn" aria-pressed="false">Cambiar a 4231</button>
        </div>
        <div class="line-up" aria-label="Soccer lineup">
            <section class="formation"></section>
        </div>
    </div>
    <script defer src="./alineacion.js"></script>
</body>
</html>
